<svg viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fcT fcD">
  <title id="fcT">Peer-selection filter chain</title>
  <desc id="fcD">Fourteen filters in four stages reduce 58 candidate companies to 15 priced peers with an effective weighted count of 15.0, with 5 rejections at the knock-out stage.</desc>
  <style>
    .th{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;fill:#0b0b0b;font-weight:700}
    .ts{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;fill:#52514e}
    .t{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;fill:#ffffff}
    rect{stroke:none}
    .c-blue rect{fill:#2a78d6}
    .c-gray rect{fill:#888780}
    .c-red rect{fill:#d03b3b}
  </style>
  <rect x="0" y="0" width="680" height="500" fill="#fcfcfb"/>

  <text class="th" x="10" y="22" font-size="16">Peer-selection filter chain — 14 controls, 4 stages</text>
  <text class="ts" x="10" y="42" font-size="12">Live counts from the Woodward run: 58 candidates → 53 ranked → 15 used → 15.0 effective</text>

  <!-- STAGE A -->
  <text class="ts" x="10" y="76" font-size="11" font-weight="700">A · ELIGIBILITY</text>
  <g class="c-blue">
    <rect x="10" y="84" width="150" height="30" rx="6"/>
    <text class="t" x="85" y="103" font-size="12" text-anchor="middle">Geography = India</text>
  </g>
  <g class="c-blue">
    <rect x="168" y="84" width="170" height="30" rx="6"/>
    <text class="t" x="253" y="103" font-size="12" text-anchor="middle">Exclude target DUNS</text>
  </g>
  <g class="c-gray">
    <rect x="530" y="84" width="140" height="30" rx="15"/>
    <text class="t" x="600" y="103" font-size="12" text-anchor="middle">58 candidates</text>
  </g>
  <line x1="350" y1="122" x2="350" y2="138" stroke="#888780" stroke-width="1.5"/>
  <polygon points="345,136 355,136 350,144" fill="#888780"/>

  <!-- STAGE B -->
  <text class="ts" x="10" y="160" font-size="11" font-weight="700">B · HARD KNOCK-OUTS — reject with recorded reason</text>
  <g class="c-blue">
    <rect x="10" y="168" width="170" height="30" rx="6"/>
    <text class="t" x="95" y="187" font-size="12" text-anchor="middle">Operating model match</text>
  </g>
  <g class="c-blue">
    <rect x="188" y="168" width="150" height="30" rx="6"/>
    <text class="t" x="263" y="187" font-size="12" text-anchor="middle">Value chain match</text>
  </g>
  <g class="c-blue">
    <rect x="346" y="168" width="165" height="30" rx="6"/>
    <text class="t" x="428" y="187" font-size="12" text-anchor="middle">Major industry match</text>
  </g>
  <g class="c-red">
    <rect x="530" y="168" width="140" height="30" rx="6"/>
    <text class="t" x="600" y="187" font-size="12" text-anchor="middle">✕ 5 rejected</text>
  </g>
  <g class="c-gray">
    <rect x="530" y="206" width="140" height="26" rx="13"/>
    <text class="t" x="600" y="223" font-size="12" text-anchor="middle">→ 53 ranked</text>
  </g>
  <line x1="350" y1="206" x2="350" y2="222" stroke="#888780" stroke-width="1.5"/>
  <polygon points="345,220 355,220 350,228" fill="#888780"/>

  <!-- STAGE C -->
  <text class="ts" x="10" y="248" font-size="11" font-weight="700">C · WEIGHTED SIMILARITY SCORE (0–1)</text>
  <g class="c-blue">
    <rect x="10" y="256" width="150" height="30" rx="6"/>
    <text class="t" x="85" y="275" font-size="12" text-anchor="middle">Industry · w 0.40</text>
  </g>
  <g class="c-blue">
    <rect x="168" y="256" width="130" height="30" rx="6"/>
    <text class="t" x="233" y="275" font-size="12" text-anchor="middle">Scale · w 0.20</text>
  </g>
  <g class="c-blue">
    <rect x="306" y="256" width="140" height="30" rx="6"/>
    <text class="t" x="376" y="275" font-size="12" text-anchor="middle">Margin · w 0.15</text>
  </g>
  <g class="c-blue">
    <rect x="10" y="294" width="150" height="30" rx="6"/>
    <text class="t" x="85" y="313" font-size="12" text-anchor="middle">Customer · w 0.15</text>
  </g>
  <g class="c-blue">
    <rect x="168" y="294" width="160" height="30" rx="6"/>
    <text class="t" x="248" y="313" font-size="12" text-anchor="middle">Export flag · w 0.10</text>
  </g>
  <g class="c-gray">
    <rect x="530" y="275" width="140" height="26" rx="13"/>
    <text class="t" x="600" y="292" font-size="12" text-anchor="middle">→ top 15 by score</text>
  </g>
  <line x1="350" y1="332" x2="350" y2="348" stroke="#888780" stroke-width="1.5"/>
  <polygon points="345,346 355,346 350,354" fill="#888780"/>

  <!-- STAGE D -->
  <text class="ts" x="10" y="374" font-size="11" font-weight="700">D · QUALITY CONTROLS ON THE MULTIPLES</text>
  <g class="c-blue">
    <rect x="10" y="382" width="110" height="30" rx="6"/>
    <text class="t" x="65" y="401" font-size="12" text-anchor="middle">Top-15 cut</text>
  </g>
  <g class="c-blue">
    <rect x="128" y="382" width="155" height="30" rx="6"/>
    <text class="t" x="205" y="401" font-size="12" text-anchor="middle">Similarity weighting</text>
  </g>
  <g class="c-blue">
    <rect x="291" y="382" width="155" height="30" rx="6"/>
    <text class="t" x="368" y="401" font-size="12" text-anchor="middle">Listed-EV eligibility</text>
  </g>
  <g class="c-blue">
    <rect x="454" y="382" width="150" height="30" rx="6"/>
    <text class="t" x="529" y="401" font-size="12" text-anchor="middle">Tukey 1.5×IQR trim</text>
  </g>
  <g class="c-gray">
    <rect x="530" y="420" width="140" height="26" rx="13"/>
    <text class="t" x="600" y="437" font-size="12" text-anchor="middle">→ effective 15.0</text>
  </g>

  <text class="ts" x="10" y="446" font-size="11">Not used anywhere: imports, per-capita — the only trade signal is the export flag (w 0.10).</text>
  <text class="ts" x="10" y="464" font-size="11">Legend: blue = screening control · red = rejected candidates · gray pills = count after the stage</text>
</svg>
